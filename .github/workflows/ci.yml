name: CI

on:
  push:
    branches:
      - master
      - main
  pull_request:
  workflow_dispatch:

jobs:
  build-linux:
    name: Build Linux plugin
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            cmake \
            g++-multilib \
            ninja-build

      - name: Build Bullet
        run: |
          git clone --depth 1 --branch 2.89 https://github.com/bulletphysics/bullet3.git bullet3
          cmake -S bullet3 -B bullet-build -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_INSTALL_PREFIX="$GITHUB_WORKSPACE/bullet-install" \
            -DCMAKE_C_FLAGS="-m32 -fPIC" \
            -DCMAKE_CXX_FLAGS="-m32 -fPIC" \
            -DBUILD_SHARED_LIBS=OFF \
            -DBUILD_EXTRAS=OFF \
            -DBUILD_UNIT_TESTS=OFF \
            -DBUILD_BULLET2_DEMOS=OFF \
            -DBUILD_OPENGL3_DEMOS=OFF \
            -DINSTALL_LIBS=ON
          cmake --build bullet-build --target install --parallel

      - name: Configure
        run: >
          cmake -S . -B build -G Ninja
          -DCMAKE_BUILD_TYPE=Release
          -DCMAKE_PREFIX_PATH="$GITHUB_WORKSPACE/bullet-install"
          -DBUILD_TESTS=ON

      - name: Build
        run: cmake --build build --config Release --parallel

      - name: Run tests
        run: ctest --test-dir build --output-on-failure -C Release

      - name: Upload Linux plugin
        uses: actions/upload-artifact@v4
        with:
          name: ColAndreas-linux
          path: |
            build/ColAndreas*.so
          if-no-files-found: error

  build-windows:
    name: Build Windows plugin
    runs-on: windows-2022

    env:
      VCPKG_DEFAULT_TRIPLET: x86-windows-static

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Bullet
        run: vcpkg install bullet3:x86-windows-static

      - name: Configure
        run: >
          cmake -S . -B build
          -G "Visual Studio 17 2022"
          -A Win32
          -DCMAKE_BUILD_TYPE=Release
          -DCMAKE_TOOLCHAIN_FILE="$env:VCPKG_INSTALLATION_ROOT/scripts/buildsystems/vcpkg.cmake"
          -DBULLET_INCLUDE_DIR="$env:VCPKG_INSTALLATION_ROOT/installed/x86-windows-static/include/bullet"
          -DBULLET_DYNAMICS_LIBRARY="$env:VCPKG_INSTALLATION_ROOT/installed/x86-windows-static/lib/BulletDynamics.lib"
          -DBULLET_COLLISION_LIBRARY="$env:VCPKG_INSTALLATION_ROOT/installed/x86-windows-static/lib/BulletCollision.lib"
          -DBULLET_MATH_LIBRARY="$env:VCPKG_INSTALLATION_ROOT/installed/x86-windows-static/lib/LinearMath.lib"
          -DBULLET_SOFTBODY_LIBRARY="$env:VCPKG_INSTALLATION_ROOT/installed/x86-windows-static/lib/BulletSoftBody.lib"
          -DBUILD_TESTS=ON

      - name: Build
        run: cmake --build build --config Release --parallel

      - name: Run tests
        run: ctest --test-dir build --output-on-failure -C Release

      - name: Upload Windows plugin
        uses: actions/upload-artifact@v4
        with:
          name: ColAndreas-windows
          path: |
            build/Release/ColAndreas.dll
          if-no-files-found: error
